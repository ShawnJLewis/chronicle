name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download and extract Android project
        run: |
          ls -la
          curl -sL https://github.com/ShawnJLewis/chronicle/releases/download/android-build/android.tar.gz -o android.tar.gz
          ls -la android.tar.gz
          tar -xzf android.tar.gz
          ls -la android/

      - name: Sync web assets
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chronicle-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
